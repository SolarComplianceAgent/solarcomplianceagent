<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Solar Compliance Agent — Sign In</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body {
      margin: 0;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: #f8fafc;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .auth-container {
      width: 100%;
      max-width: 400px;
    }

    .auth-card {
      background: white;
      border-radius: 14px;
      box-shadow: 0 10px 30px rgba(2, 6, 23, 0.08);
      padding: 32px 28px;
      width: 100%;
    }

    .logo-section {
      text-align: center;
      margin-bottom: 32px;
    }

    .logo {
      font-size: 24px;
      font-weight: 800;
      color: #1a6b3c;
      letter-spacing: 0.2px;
      margin-bottom: 8px;
    }

    .subtitle {
      font-size: 14px;
      color: #475569;
      margin: 0;
    }

    .auth-heading {
      font-size: 20px;
      font-weight: 700;
      color: #0f172a;
      margin: 0 0 24px 0;
      text-align: center;
    }

    .form-group {
      margin-bottom: 16px;
    }

    input[type="email"],
    input[type="password"],
    input[type="text"] {
      width: 100%;
      padding: 12px 16px;
      border: 1px solid #e2e8f0;
      border-radius: 10px;
      background: #fff;
      color: #0f172a;
      outline: none;
      transition: border-color 120ms ease, box-shadow 120ms ease;
      font-family: inherit;
      font-size: 14px;
    }

    input[type="email"]:focus,
    input[type="password"]:focus,
    input[type="text"]:focus {
      border-color: rgba(26, 107, 60, 0.6);
      box-shadow: 0 0 0 4px rgba(26, 107, 60, 0.12);
    }

    .btn {
      appearance: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      padding: 12px 16px;
      border-radius: 10px;
      font-weight: 700;
      font-size: 14px;
      cursor: pointer;
      text-decoration: none;
      transition: all 120ms ease;
      border: none;
      margin-bottom: 12px;
    }

    .btn-primary {
      background: #1a6b3c;
      color: #fff;
      box-shadow: 0 4px 12px rgba(26, 107, 60, 0.18);
    }

    .btn-primary:hover {
      box-shadow: 0 6px 16px rgba(26, 107, 60, 0.22);
      transform: translateY(-1px);
    }

    .btn-primary:active {
      transform: translateY(0);
    }

    .btn-primary:disabled {
      opacity: 0.7;
      cursor: not-allowed;
      transform: none !important;
      box-shadow: none !important;
    }

    .link {
      color: #475569;
      font-size: 13px;
      text-decoration: none;
      transition: color 120ms ease;
    }

    .link:hover {
      color: #1a6b3c;
    }

    .auth-footer {
      text-align: center;
      margin-top: 24px;
      padding-top: 20px;
      border-top: 1px solid #e2e8f0;
      font-size: 14px;
      color: #475569;
    }

    .auth-footer a {
      color: #1a6b3c;
      text-decoration: none;
      font-weight: 600;
    }

    .auth-footer a:hover {
      text-decoration: underline;
    }

    .error-box {
      background: rgba(185, 28, 28, 0.08);
      border: 1px solid rgba(185, 28, 28, 0.25);
      color: #b91c1c;
      padding: 12px 14px;
      border-radius: 10px;
      font-size: 13px;
      margin-bottom: 16px;
      display: none;
    }

    .error-box.show {
      display: block;
    }

    .success-box {
      background: rgba(22, 163, 74, 0.08);
      border: 1px solid rgba(22, 163, 74, 0.25);
      color: #166534;
      padding: 12px 14px;
      border-radius: 10px;
      font-size: 13px;
      margin-bottom: 16px;
      display: none;
    }

    .success-box.show {
      display: block;
    }

    .hidden {
      display: none !important;
    }

    .google-note {
      text-align: center;
      margin-top: 16px;
      font-size: 12px;
      color: #475569;
    }

    @media (max-width: 480px) {
      body {
        padding: 16px;
      }
      
      .auth-card {
        padding: 24px 20px;
      }
      
      .logo {
        font-size: 20px;
      }
      
      .auth-heading {
        font-size: 18px;
      }
    }
  </style>
</head>
<body>
  <div class="auth-container">
    <div class="auth-card">
      <!-- Logo Section -->
      <div class="logo-section">
        <div class="logo">⚡ Solar Compliance Agent</div>
        <p class="subtitle">Permit compliance made simple</p>
      </div>

      <!-- Error/Success Messages -->
      <div id="errorBox" class="error-box"></div>
      <div id="successBox" class="success-box"></div>

      <!-- Sign In View -->
      <div id="signInView">
        <h2 class="auth-heading">Welcome back</h2>
        
        <div class="form-group">
          <input type="email" id="signInEmail" placeholder="you@example.com" required autocomplete="email">
        </div>
        
        <div class="form-group">
          <input type="password" id="signInPassword" placeholder="•••••••" required autocomplete="current-password">
        </div>
        
        <button id="signInBtn" class="btn btn-primary" type="button">
          <span>Sign In</span>
        </button>
        
        <div style="text-align: center;">
          <a href="#" id="forgotPasswordLink" class="link">Forgot password?</a>
        </div>
      </div>

      <!-- Sign Up View -->
      <div id="signUpView" class="hidden">
        <h2 class="auth-heading">Create your account</h2>
        
        <div class="form-group">
          <input type="text" id="signUpFullName" placeholder="Full Name" required autocomplete="name">
        </div>
        
        <div class="form-group">
          <input type="text" id="signUpCompanyName" placeholder="Company Name" required autocomplete="organization">
        </div>
        
        <div class="form-group">
          <input type="email" id="signUpEmail" placeholder="you@example.com" required autocomplete="email">
        </div>
        
        <div class="form-group">
          <input type="password" id="signUpPassword" placeholder="Min. 8 characters" required autocomplete="new-password" minlength="8">
        </div>
        
        <button id="signUpBtn" class="btn btn-primary" type="button">
          <span>Create Account</span>
        </button>
      </div>

      <!-- Forgot Password View -->
      <div id="forgotPasswordView" class="hidden">
        <h2 class="auth-heading">Reset your password</h2>
        
        <div class="form-group">
          <input type="email" id="resetEmail" placeholder="you@example.com" required autocomplete="email">
        </div>
        
        <button id="resetBtn" class="btn btn-primary" type="button">
          <span>Send Reset Link</span>
        </button>
        
        <div style="text-align: center; margin-top: 16px;">
          <a href="#" id="backToSignInLink" class="link">← Back to sign in</a>
        </div>
      </div>

      <!-- Footer -->
      <div id="signInFooter" class="auth-footer">
        Don't have an account? <a href="#" id="showSignUpLink">Sign up</a>
      </div>
      
      <div id="signUpFooter" class="auth-footer hidden">
        Already have an account? <a href="#" id="showSignInLink">Sign in</a>
      </div>

      <!-- Google Note -->
      <div class="google-note">
        Google sign-in coming soon
      </div>
    </div>
  </div>

  <script>
    const SUPABASE_URL = 'https://javojiuejzkockcjivae.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_1GDGd_58rM8sXTNFt93Mbw_yItm-LGv';
    const { createClient } = supabase;

    // CRITICAL AUTH FIX — If already logged in redirect away immediately
    const sb = createClient(SUPABASE_URL, SUPABASE_KEY);
    sb.auth.onAuthStateChange((event, session) => {
      if (event === 'INITIAL_SESSION' && session) {
        window.location.replace('dashboard.html');
      }
      if (event === 'SIGNED_IN') {
        window.location.replace('dashboard.html');
      }
    });

    // DOM elements
    const errorBox = document.getElementById('errorBox');
    const successBox = document.getElementById('successBox');
    
    // View containers
    const signInView = document.getElementById('signInView');
    const signUpView = document.getElementById('signUpView');
    const forgotPasswordView = document.getElementById('forgotPasswordView');
    const signInFooter = document.getElementById('signInFooter');
    const signUpFooter = document.getElementById('signUpFooter');
    
    // Sign in elements
    const signInEmail = document.getElementById('signInEmail');
    const signInPassword = document.getElementById('signInPassword');
    const signInBtn = document.getElementById('signInBtn');
    const forgotPasswordLink = document.getElementById('forgotPasswordLink');
    
    // Sign up elements
    const signUpFullName = document.getElementById('signUpFullName');
    const signUpCompanyName = document.getElementById('signUpCompanyName');
    const signUpEmail = document.getElementById('signUpEmail');
    const signUpPassword = document.getElementById('signUpPassword');
    const signUpBtn = document.getElementById('signUpBtn');
    
    // Forgot password elements
    const resetEmail = document.getElementById('resetEmail');
    const resetBtn = document.getElementById('resetBtn');
    const backToSignInLink = document.getElementById('backToSignInLink');
    
    // Footer links
    const showSignUpLink = document.getElementById('showSignUpLink');
    const showSignInLink = document.getElementById('showSignInLink');

    // Utility functions
    function showError(message) {
      errorBox.textContent = message;
      errorBox.classList.add('show');
      successBox.classList.remove('show');
    }

    function showSuccess(message) {
      successBox.textContent = message;
      successBox.classList.add('show');
      errorBox.classList.remove('show');
    }

    function clearMessages() {
      errorBox.classList.remove('show');
      successBox.classList.remove('show');
    }

    function setButtonLoading(button, loadingText) {
      button.disabled = true;
      const originalText = button.querySelector('span').textContent;
      button.querySelector('span').textContent = loadingText;
      return () => {
        button.disabled = false;
        button.querySelector('span').textContent = originalText;
      };
    }

    function showView(viewName) {
      clearMessages();
      
      // Hide all views
      signInView.classList.add('hidden');
      signUpView.classList.add('hidden');
      forgotPasswordView.classList.add('hidden');
      signInFooter.classList.add('hidden');
      signUpFooter.classList.add('hidden');
      
      // Show selected view
      switch(viewName) {
        case 'signin':
          signInView.classList.remove('hidden');
          signInFooter.classList.remove('hidden');
          break;
        case 'signup':
          signUpView.classList.remove('hidden');
          signUpFooter.classList.remove('hidden');
          break;
        case 'forgot':
          forgotPasswordView.classList.remove('hidden');
          break;
      }
    }

    // Auth functions
    async function signInWithEmail() {
      const email = signInEmail.value.trim();
      const password = signInPassword.value;
      
      if (!email || !password) {
        showError('Please enter both email and password.');
        return;
      }
      
      const resetButton = setButtonLoading(signInBtn, 'Signing in...');
      try {
        const { data, error } = await sb.auth.signInWithPassword({ email, password });
        if (error) {
          if (error.message.includes('Invalid login credentials')) {
            showError('Wrong email or password');
          } else if (error.message.includes('Email not confirmed')) {
            showError('Please confirm your email first');
          } else {
            showError(error.message);
          }
          resetButton();
        } else {
          window.location.replace('dashboard.html');
        }
      } catch (error) {
        showError('An error occurred. Please try again.');
        resetButton();
      }
    }

    async function signUpWithEmail() {
      const fullName = signUpFullName.value.trim();
      const companyName = signUpCompanyName.value.trim();
      const email = signUpEmail.value.trim();
      const password = signUpPassword.value;
      
      if (!fullName || !companyName || !email || !password) {
        showError('Please fill in all fields.');
        return;
      }
      
      if (password.length < 8) {
        showError('Password must be at least 8 characters.');
        return;
      }
      
      const resetButton = setButtonLoading(signUpBtn, 'Creating account...');
      try {
        const { data, error } = await sb.auth.signUp({
          email,
          password,
          options: {
            emailRedirectTo: window.location.origin + '/dashboard.html',
            data: { full_name: fullName, company_name: companyName }
          }
        });
        
        if (error) {
          if (error.message.includes('User already registered')) {
            showError('Account exists — sign in instead');
          } else {
            showError(error.message);
          }
          resetButton();
        } else {
          showSuccess('Check your email to confirm your account then come back and sign in');
          resetButton();
          // Clear form
          signUpFullName.value = '';
          signUpCompanyName.value = '';
          signUpEmail.value = '';
          signUpPassword.value = '';
        }
      } catch (error) {
        showError('An error occurred. Please try again.');
        resetButton();
      }
    }

    async function resetPassword() {
      const email = resetEmail.value.trim();
      
      if (!email) {
        showError('Please enter your email address.');
        return;
      }
      
      const resetButton = setButtonLoading(resetBtn, 'Sending reset link...');
      try {
        const { error } = await sb.auth.resetPasswordForEmail(email, {
          redirectTo: window.location.origin + '/auth.html'
        });
        
        if (error) {
          showError(error.message);
          resetButton();
        } else {
          showSuccess('Check your email for a reset link');
          resetButton();
          resetEmail.value = '';
        }
      } catch (error) {
        showError('An error occurred. Please try again.');
        resetButton();
      }
    }

    // Event listeners
    signInBtn.addEventListener('click', signInWithEmail);
    signUpBtn.addEventListener('click', signUpWithEmail);
    resetBtn.addEventListener('click', resetPassword);
    
    // View toggles
    showSignUpLink.addEventListener('click', (e) => {
      e.preventDefault();
      showView('signup');
    });
    
    showSignInLink.addEventListener('click', (e) => {
      e.preventDefault();
      showView('signin');
    });
    
    forgotPasswordLink.addEventListener('click', (e) => {
      e.preventDefault();
      showView('forgot');
    });
    
    backToSignInLink.addEventListener('click', (e) => {
      e.preventDefault();
      showView('signin');
    });

    // Enter key support
    signInPassword.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') signInWithEmail();
    });
    
    signUpPassword.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') signUpWithEmail();
    });
    
    resetEmail.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') resetPassword();
    });

    // Initialize
    document.addEventListener('DOMContentLoaded', () => {
      showView('signin');
    });
  </script>
</body>
</html>
