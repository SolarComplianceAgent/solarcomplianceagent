<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Solar Compliance Agent — Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body {
      margin: 0;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: #ffffff;
      color: #0f172a;
    }

    .navbar {
      position: sticky;
      top: 0;
      z-index: 10;
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid #e2e8f0;
    }

    .nav-inner {
      max-width: 1200px;
      margin: 0 auto;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .logo {
      font-weight: 800;
      letter-spacing: 0.2px;
      color: #1a6b3c;
      font-size: 20px;
      text-decoration: none;
    }

    .nav-actions {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .user-email {
      color: #475569;
      font-size: 14px;
      margin-right: 8px;
    }

    .btn {
      appearance: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 10px 16px;
      border-radius: 10px;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      text-decoration: none;
      transition: all 120ms ease;
      border: none;
    }

    .btn-primary {
      background: #1a6b3c;
      color: #fff;
      box-shadow: 0 4px 12px rgba(26, 107, 60, 0.18);
    }

    .btn-primary:hover {
      box-shadow: 0 6px 16px rgba(26, 107, 60, 0.22);
      transform: translateY(-1px);
    }

    .btn-secondary {
      background: #f8fafc;
      color: #475569;
      border: 1px solid #e2e8f0;
    }

    .btn-secondary:hover {
      background: #f1f5f9;
      border-color: #cbd5e1;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 32px 20px;
    }

    .page-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 24px;
      flex-wrap: wrap;
      gap: 16px;
    }

    h1 {
      margin: 0 0 8px 0;
      font-size: 28px;
      font-weight: 700;
      color: #0f172a;
    }

    .job-count {
      color: #475569;
      font-size: 16px;
      margin: 0;
    }

    .toolbar {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .search-bar {
      position: relative;
      flex: 1;
      max-width: 300px;
    }

    .search-bar input {
      width: 100%;
      padding: 10px 16px;
      border: 1px solid #e2e8f0;
      border-radius: 10px;
      background: #fff;
      color: #0f172a;
      font-size: 14px;
      outline: none;
      transition: border-color 120ms ease, box-shadow 120ms ease;
    }

    .search-bar input:focus {
      border-color: rgba(26, 107, 60, 0.6);
      box-shadow: 0 0 0 4px rgba(26, 107, 60, 0.12);
    }

    .search-bar input::placeholder {
      color: #94a3b8;
    }

    .table-container {
      background: white;
      border-radius: 14px;
      box-shadow: 0 10px 30px rgba(2, 6, 23, 0.08);
      overflow: hidden;
      border: 1px solid #e2e8f0;
    }

    .table-scroll {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }

    thead th {
      text-align: left;
      padding: 16px 20px;
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: #475569;
      background: #f8fafc;
      border-bottom: 1px solid #e2e8f0;
      white-space: nowrap;
    }

    tbody td {
      padding: 16px 20px;
      border-bottom: 1px solid #e2e8f0;
      vertical-align: middle;
      color: #0f172a;
    }

    tbody tr:last-child td {
      border-bottom: none;
    }

    tbody tr {
      transition: background-color 120ms ease;
    }

    tbody tr:hover {
      background: rgba(26, 107, 60, 0.04);
    }

    .status-badge {
      display: inline-flex;
      align-items: center;
      padding: 6px 12px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
      text-transform: capitalize;
      white-space: nowrap;
    }

    .status-badge.pending {
      background: rgba(234, 179, 8, 0.15);
      color: #854d0e;
      border: 1px solid rgba(234, 179, 8, 0.3);
    }

    .status-badge.in-progress {
      background: rgba(59, 130, 246, 0.15);
      color: #1d4ed8;
      border: 1px solid rgba(59, 130, 246, 0.3);
    }

    .status-badge.completed {
      background: rgba(22, 163, 74, 0.15);
      color: #166534;
      border: 1px solid rgba(22, 163, 74, 0.3);
    }

    .btn-action {
      appearance: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 8px 12px;
      border-radius: 8px;
      border: 1px solid rgba(26, 107, 60, 0.3);
      background: #fff;
      color: #1a6b3c;
      font-weight: 600;
      font-size: 12px;
      cursor: pointer;
      text-decoration: none;
      transition: all 120ms ease;
    }

    .btn-action:hover {
      background: rgba(26, 107, 60, 0.08);
      border-color: rgba(26, 107, 60, 0.5);
    }

    .empty-state {
      padding: 64px 32px;
      text-align: center;
      color: #475569;
    }

    .empty-state h2 {
      margin: 0 0 16px 0;
      font-size: 24px;
      color: #0f172a;
    }

    .empty-state p {
      margin: 0 0 24px 0;
      font-size: 16px;
      line-height: 1.5;
    }

    .loading-state {
      padding: 64px 32px;
      text-align: center;
      color: #475569;
      font-size: 16px;
    }

    @media (max-width: 768px) {
      .nav-inner {
        padding: 12px 16px;
      }

      .container {
        padding: 24px 16px;
      }

      .page-head {
        flex-direction: column;
        align-items: stretch;
      }

      .toolbar {
        flex-direction: column;
        align-items: stretch;
      }

      .search-bar {
        max-width: none;
      }

      .table-scroll {
        margin: 0 -16px;
        padding: 0 16px;
      }

      thead th,
      tbody td {
        padding: 12px 16px;
      }

      .empty-state {
        padding: 48px 24px;
      }
    }
  </style>
</head>
<body>
  <header class="navbar">
    <div class="nav-inner">
      <a href="dashboard.html" class="logo">⚡ Solar Compliance Agent</a>
      <div class="nav-actions">
        <span id="userEmail" class="user-email"></span>
        <button id="signOutBtn" class="btn btn-secondary">Sign Out</button>
      </div>
    </div>
  </header>

  <main class="container">
    <div class="page-head">
      <div>
        <h1>My Jobs</h1>
        <p id="jobCount" class="job-count">0 jobs total</p>
      </div>
      <div class="toolbar">
        <div class="search-bar">
          <input 
            id="searchInput" 
            type="search" 
            placeholder="Search by customer name or city..."
            autocomplete="off"
          >
        </div>
        <a href="intake.html" class="btn btn-primary">+ New Job</a>
      </div>
    </div>

    <div class="table-container">
      <div class="table-scroll">
        <table id="jobsTable">
          <thead>
            <tr>
              <th>Customer Name</th>
              <th>Address</th>
              <th>City</th>
              <th>State</th>
              <th>System kW</th>
              <th>Utility</th>
              <th>Status</th>
              <th>Date</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="jobsBody">
            <tr class="loading-state">
              <td colspan="9">Loading jobs...</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>

    <div id="emptyState" class="empty-state" style="display: none;">
      <h2>No jobs yet</h2>
      <p>Submit your first job to get started.</p>
      <a href="intake.html" class="btn btn-primary">+ New Job</a>
    </div>
  </main>

  <script>
    const SUPABASE_URL = 'https://javojiuejzkockcjivae.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_1GDGd_58rM8sXTNFt93Mbw_yItm-LGv';
    const { createClient } = supabase;

    // CRITICAL AUTH FIX — this must be FIRST thing in script
    const sb = createClient(SUPABASE_URL, SUPABASE_KEY);
    let currentUser = null;

    sb.auth.onAuthStateChange((event, session) => {
      if (event === 'INITIAL_SESSION') {
        if (!session) {
          window.location.replace('auth.html');
        } else {
          currentUser = session.user;
          loadDashboard();
        }
      }
      if (event === 'SIGNED_OUT') {
        window.location.replace('auth.html');
      }
    });

    // DOM elements
    const userEmailEl = document.getElementById('userEmail');
    const signOutBtn = document.getElementById('signOutBtn');
    const jobCountEl = document.getElementById('jobCount');
    const searchInput = document.getElementById('searchInput');
    const jobsBody = document.getElementById('jobsBody');
    const emptyStateEl = document.getElementById('emptyState');
    const tableContainer = document.querySelector('.table-container');

    let allJobs = [];

    // Update navbar with user info
    function updateNavbar() {
      if (currentUser && userEmailEl) {
        userEmailEl.textContent = currentUser.email;
      }
    }

    // Sign out function
    async function signOut() {
      try {
        await sb.auth.signOut();
        window.location.replace('auth.html');
      } catch (error) {
        console.error('Sign out error:', error);
      }
    }

    // Load dashboard data
    async function loadDashboard() {
      if (!currentUser) return;

      updateNavbar();

      try {
        const { data: jobs, error } = await sb
          .from('jobs')
          .select('*')
          .eq('user_id', currentUser.id)
          .order('created_at', { ascending: false });

        if (error) {
          console.error('Error loading jobs:', error);
          showError('Failed to load jobs');
          return;
        }

        allJobs = jobs || [];
        renderTable(allJobs);
      } catch (error) {
        console.error('Error loading dashboard:', error);
        showError('Failed to load dashboard');
      }
    }

    // Render jobs table
    function renderTable(jobs) {
      const filteredJobs = filterJobs(jobs);
      
      // Update job count
      jobCountEl.textContent = `${allJobs.length} job${allJobs.length === 1 ? '' : 's'} total`;

      if (allJobs.length === 0) {
        // Show empty state
        tableContainer.style.display = 'none';
        emptyStateEl.style.display = 'block';
        return;
      }

      // Show table
      tableContainer.style.display = 'block';
      emptyStateEl.style.display = 'none';

      if (filteredJobs.length === 0) {
        jobsBody.innerHTML = `
          <tr>
            <td colspan="9" style="text-align: center; padding: 32px; color: #475569;">
              No jobs match your search.
            </td>
          </tr>
        `;
        return;
      }

      jobsBody.innerHTML = filteredJobs.map(job => `
        <tr>
          <td>${escapeHtml(job.customer_full_name || '—')}</td>
          <td>${escapeHtml(job.job_address || '—')}</td>
          <td>${escapeHtml(job.city || '—')}</td>
          <td>${escapeHtml(job.state || '—')}</td>
          <td>${formatKw(job.system_size_kw)}</td>
          <td>${escapeHtml(job.utility_provider || '—')}</td>
          <td>${getStatusBadge(job.status)}</td>
          <td>${formatDate(job.created_at)}</td>
          <td>
            <a href="checklist.html?id=${job.id}" class="btn-action">View Checklist</a>
          </td>
        </tr>
      `).join('');
    }

    // Filter jobs based on search
    function filterJobs(jobs) {
      const query = searchInput.value.trim().toLowerCase();
      if (!query) return jobs;

      return jobs.filter(job => {
        const customerName = (job.customer_full_name || '').toLowerCase();
        const city = (job.city || '').toLowerCase();
        return customerName.includes(query) || city.includes(query);
      });
    }

    // Get status badge HTML
    function getStatusBadge(status) {
      const normalizedStatus = normalizeStatus(status);
      return `<span class="status-badge ${normalizedStatus}">${normalizedStatus.replace('-', ' ')}</span>`;
    }

    // Normalize status value
    function normalizeStatus(status) {
      if (!status) return 'pending';
      
      const s = status.toString().toLowerCase().trim();
      if (s === 'pending') return 'pending';
      if (s === 'in-progress' || s === 'in_progress') return 'in-progress';
      if (s === 'completed' || s === 'complete') return 'completed';
      return 'pending';
    }

    // Format kW value
    function formatKw(kw) {
      if (!kw || kw === 0) return '—';
      const num = parseFloat(kw);
      return isNaN(num) ? '—' : `${num} kW`;
    }

    // Format date
    function formatDate(dateString) {
      if (!dateString) return '—';
      
      try {
        const date = new Date(dateString);
        return date.toLocaleDateString('en-US', {
          year: 'numeric',
          month: 'short',
          day: 'numeric'
        });
      } catch (error) {
        return '—';
      }
    }

    // Escape HTML
    function escapeHtml(text) {
      if (!text) return '';
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // Show error message
    function showError(message) {
      jobsBody.innerHTML = `
        <tr>
          <td colspan="9" style="text-align: center; padding: 32px; color: #dc2626;">
            ${message}
          </td>
        </tr>
      `;
    }

    // Event listeners
    signOutBtn.addEventListener('click', signOut);
    searchInput.addEventListener('input', () => renderTable(allJobs));

    // Initialize
    document.addEventListener('DOMContentLoaded', () => {
      // Auth state change will trigger loadDashboard()
    });
  </script>
</body>
</html>
