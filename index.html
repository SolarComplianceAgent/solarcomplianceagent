<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Solar Compliance Agent</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body{margin:0;display:flex;align-items:center;justify-content:center;
         height:100vh;background:#f8fafc;font-family:sans-serif;color:#1a6b3c}
    .wrap{text-align:center}
    .spinner{width:36px;height:36px;border:3px solid #e2e8f0;
             border-top-color:#1a6b3c;border-radius:50%;
             animation:spin .8s linear infinite;margin:0 auto 14px}
    @keyframes spin{to{transform:rotate(360deg)}}
    .logo{font-size:18px;font-weight:700}
    .sub{font-size:12px;color:#94a3b8;margin-top:4px}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="spinner"></div>
    <div class="logo">Solar Compliance Agent</div>
    <div class="sub">Loading...</div>
  </div>
  <script>
    const { createClient } = supabase;
    const sb = createClient(
      'https://javojiuejzkockcjivae.supabase.co',
      'sb_publishable_1GDGd_58rM8sXTNFt93Mbw_yItm-LGv'
    );
    sb.auth.onAuthStateChange((event, session) => {
      if (event === 'INITIAL_SESSION') {
        window.location.replace(
          session ? 'dashboard.html' : 'auth.html'
        );
      }
    });
  </script>
</body>
</html>
